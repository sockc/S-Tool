plugins {
    id 'com.android.application'
}

android {
    namespace 'com.sockc.unicomhook'
    compileSdk 34

    // 引入刚刚上传的签名文件
    signingConfigs {
        myConfig {
            storeFile file("module.jks") 
            storePassword "123456"
            keyAlias "module"
            keyPassword "123456"
        }
    }

    defaultConfig {
        applicationId "com.sockc.unicomhook"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.myConfig
        }
        debug {
            signingConfig signingConfigs.myConfig
        }
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}
